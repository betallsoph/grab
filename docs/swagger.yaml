basePath: /api/v1
definitions:
  internal_modules_chat.Conversation:
    properties:
      created_at:
        type: string
      created_by:
        type: integer
      id:
        type: string
      name:
        description: tên nhóm, rỗng nếu direct
        type: string
      participants:
        items:
          type: integer
        type: array
      type:
        $ref: '#/definitions/internal_modules_chat.ConversationType'
      updated_at:
        type: string
    type: object
  internal_modules_chat.ConversationType:
    enum:
    - direct
    - group
    type: string
    x-enum-comments:
      ConvDirect: Chat 1-1
      ConvGroup: Chat nhóm
    x-enum-descriptions:
    - Chat 1-1
    - Chat nhóm
    x-enum-varnames:
    - ConvDirect
    - ConvGroup
  internal_modules_chat.CreateConversationRequest:
    properties:
      name:
        type: string
      participants:
        items:
          type: integer
        type: array
      type:
        $ref: '#/definitions/internal_modules_chat.ConversationType'
    type: object
  internal_modules_chat.Message:
    properties:
      content:
        type: string
      content_type:
        description: '"text", "image", "voice"'
        type: string
      conversation_id:
        type: string
      created_at:
        type: string
      id:
        type: string
      sender_id:
        type: integer
    type: object
  internal_modules_chat.SendMessageRequest:
    properties:
      content:
        type: string
      content_type:
        description: '"text" nếu rỗng'
        type: string
    type: object
  internal_modules_earning.AddTripRequest:
    properties:
      fuel_cost:
        type: number
      gross_amount:
        type: number
      note:
        type: string
      other_cost:
        type: number
      platform_fee:
        type: number
      trip_date:
        description: YYYY-MM-DD
        type: string
    type: object
  internal_modules_earning.DailySummary:
    properties:
      date:
        description: YYYY-MM-DD
        type: string
      total_fees:
        type: number
      total_fuel:
        type: number
      total_gross:
        type: number
      total_net:
        type: number
      total_other:
        type: number
      trip_count:
        type: integer
    type: object
  internal_modules_earning.MonthlySummary:
    properties:
      daily_avg_net:
        description: trung bình lãi ròng/ngày
        type: number
      month:
        description: YYYY-MM
        type: string
      total_fees:
        type: number
      total_fuel:
        type: number
      total_gross:
        type: number
      total_net:
        type: number
      total_other:
        type: number
      trip_count:
        type: integer
    type: object
  internal_modules_earning.Trip:
    properties:
      created_at:
        type: string
      driver_id:
        type: integer
      fuel_cost:
        description: xăng
        type: number
      gross_amount:
        description: tổng thu
        type: number
      id:
        type: integer
      net_amount:
        description: lãi ròng = gross - fees - costs
        type: number
      note:
        type: string
      other_cost:
        description: phí khác (gửi xe, phạt...)
        type: number
      platform_fee:
        description: phí nền tảng (%)
        type: number
      trip_date:
        type: string
    type: object
  internal_modules_emergency.AddContactRequest:
    properties:
      alias:
        type: string
      contact_id:
        type: integer
    type: object
  internal_modules_emergency.EmergencyContact:
    properties:
      alias:
        description: biệt danh
        type: string
      contact_id:
        description: userID của anh em
        type: integer
      created_at:
        type: string
      driver_id:
        type: integer
      id:
        type: integer
    type: object
  internal_modules_mood.Comment:
    properties:
      author_id:
        type: integer
      author_name:
        type: string
      content:
        type: string
      created_at:
        type: string
      id:
        type: string
      is_anonymous:
        type: boolean
      post_id:
        type: string
    type: object
  internal_modules_mood.CreateCommentRequest:
    properties:
      content:
        type: string
      is_anonymous:
        type: boolean
    type: object
  internal_modules_mood.CreatePostRequest:
    properties:
      content:
        type: string
      is_anonymous:
        type: boolean
      mood:
        type: string
    type: object
  internal_modules_mood.Post:
    properties:
      author_id:
        type: integer
      author_name:
        description: hiển thị "Ẩn danh" nếu anonymous
        type: string
      comment_count:
        type: integer
      content:
        type: string
      created_at:
        type: string
      id:
        type: string
      is_anonymous:
        type: boolean
      like_count:
        type: integer
      mood:
        description: happy, sad, angry, tired, funny
        type: string
    type: object
  internal_modules_reminder.ReminderConfig:
    properties:
      created_at:
        type: string
      driver_id:
        type: integer
      id:
        type: integer
      quiet_end:
        type: string
      quiet_start:
        description: HH:MM — không nhắc ban đêm
        type: string
      stretch_enabled:
        type: boolean
      stretch_interval_min:
        type: integer
      updated_at:
        type: string
      water_enabled:
        type: boolean
      water_interval_min:
        description: phút
        type: integer
    type: object
  internal_modules_reminder.ReminderStatus:
    properties:
      driver_id:
        type: integer
      next_stretch_at:
        type: integer
      next_water_at:
        description: unix timestamp
        type: integer
    type: object
  internal_modules_reminder.UpdateConfigRequest:
    properties:
      quiet_end:
        type: string
      quiet_start:
        type: string
      stretch_enabled:
        type: boolean
      stretch_interval_min:
        type: integer
      water_enabled:
        type: boolean
      water_interval_min:
        type: integer
    type: object
  internal_modules_survivalmap.Category:
    enum:
    - food
    - repair
    - cafe
    - wc
    - gas
    - rest
    - other
    type: string
    x-enum-comments:
      CatCafe: Cà phê võng, nước mía
      CatFood: Quán ăn, cơm bụi
      CatGas: Đổ xăng
      CatRepair: Sửa xe, vá vỏ
      CatRest: Chỗ nghỉ, ghế đá, bóng mát
      CatWC: Nhà vệ sinh công cộng
    x-enum-descriptions:
    - Quán ăn, cơm bụi
    - Sửa xe, vá vỏ
    - Cà phê võng, nước mía
    - Nhà vệ sinh công cộng
    - Đổ xăng
    - Chỗ nghỉ, ghế đá, bóng mát
    - ""
    x-enum-varnames:
    - CatFood
    - CatRepair
    - CatCafe
    - CatWC
    - CatGas
    - CatRest
    - CatOther
  internal_modules_survivalmap.CreatePOIRequest:
    properties:
      address:
        type: string
      category:
        $ref: '#/definitions/internal_modules_survivalmap.Category'
      description:
        type: string
      latitude:
        type: number
      longitude:
        type: number
      name:
        type: string
    type: object
  internal_modules_survivalmap.POI:
    properties:
      address:
        type: string
      category:
        $ref: '#/definitions/internal_modules_survivalmap.Category'
      created_at:
        type: string
      created_by:
        description: userID của tài xế đóng góp
        type: integer
      description:
        type: string
      id:
        type: integer
      latitude:
        type: number
      longitude:
        type: number
      name:
        type: string
      updated_at:
        type: string
      upvote_count:
        type: integer
    type: object
  internal_modules_survivalmap.POIWithDistance:
    properties:
      address:
        type: string
      category:
        $ref: '#/definitions/internal_modules_survivalmap.Category'
      created_at:
        type: string
      created_by:
        description: userID của tài xế đóng góp
        type: integer
      description:
        type: string
      distance_m:
        type: number
      id:
        type: integer
      latitude:
        type: number
      longitude:
        type: number
      name:
        type: string
      updated_at:
        type: string
      upvote_count:
        type: integer
    type: object
  internal_modules_user.LoginRequest:
    properties:
      password:
        type: string
      phone:
        type: string
    type: object
  internal_modules_user.LoginResponse:
    properties:
      token:
        type: string
      user:
        $ref: '#/definitions/internal_modules_user.UserPublic'
    type: object
  internal_modules_user.RegisterRequest:
    properties:
      full_name:
        type: string
      password:
        type: string
      phone:
        type: string
    type: object
  internal_modules_user.UpdateLocationRequest:
    properties:
      latitude:
        type: number
      longitude:
        type: number
    type: object
  internal_modules_user.UserPublic:
    properties:
      full_name:
        type: string
      id:
        type: integer
      phone:
        type: string
    type: object
host: localhost:8080
info:
  contact: {}
  description: |-
    Backend API cho Superapp dành cho Tài xế công nghệ.
    Bao gồm: Auth, GPS Tracking, SOS, Chat, Map Sinh tồn, Mood, Earning, Reminder, Emergency Contact.
  title: Grab Driver Superapp API
  version: "1.0"
paths:
  /auth/login:
    post:
      consumes:
      - application/json
      description: Xác thực bằng SĐT + mật khẩu, trả về JWT token
      parameters:
      - description: Thông tin đăng nhập
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_modules_user.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_modules_user.LoginResponse'
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Đăng nhập
      tags:
      - Auth
  /auth/register:
    post:
      consumes:
      - application/json
      description: Tạo tài khoản mới bằng số điện thoại và mật khẩu
      parameters:
      - description: Thông tin đăng ký
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_modules_user.RegisterRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Đăng ký tài khoản tài xế
      tags:
      - Auth
  /chat/conversations:
    get:
      description: Lấy danh sách conversation mà tài xế tham gia, mới nhất trước
      parameters:
      - description: Số kết quả (mặc định 30)
        in: query
        name: limit
        type: integer
      - description: Offset phân trang
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/internal_modules_chat.Conversation'
            type: array
      security:
      - BearerAuth: []
      summary: Danh sách conversation
      tags:
      - Chat
    post:
      consumes:
      - application/json
      description: Tạo chat 1-1 (direct) hoặc nhóm (group). Direct giữa 2 người nếu
        đã tồn tại sẽ trả lại cái cũ.
      parameters:
      - description: Thông tin conversation
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_modules_chat.CreateConversationRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/internal_modules_chat.Conversation'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Tạo conversation
      tags:
      - Chat
  /chat/conversations/{convId}/messages:
    get:
      description: Lấy tin nhắn trong conversation, mới nhất trước
      parameters:
      - description: Conversation ID
        in: path
        name: convId
        required: true
        type: string
      - description: Số tin nhắn (mặc định 50)
        in: query
        name: limit
        type: integer
      - description: Offset phân trang
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/internal_modules_chat.Message'
            type: array
      security:
      - BearerAuth: []
      summary: Lịch sử tin nhắn
      tags:
      - Chat
    post:
      consumes:
      - application/json
      description: Gửi tin nhắn vào conversation qua REST API (backup cho WebSocket)
      parameters:
      - description: Conversation ID (ObjectID hex)
        in: path
        name: convId
        required: true
        type: string
      - description: Nội dung tin nhắn
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_modules_chat.SendMessageRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/internal_modules_chat.Message'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Gửi tin nhắn (REST)
      tags:
      - Chat
  /chat/ws:
    get:
      description: Upgrade lên WebSocket cho real-time chat. Gửi {"type":"send","conversation_id":"...","content":"hello"}
        để chat, {"type":"typing","conversation_id":"..."} để báo đang gõ.
      responses: {}
      security:
      - BearerAuth: []
      summary: WebSocket Chat
      tags:
      - Chat
  /drivers/location:
    post:
      consumes:
      - application/json
      description: Mobile bắn tọa độ GPS lên mỗi vài giây, lưu vào Redis Geo
      parameters:
      - description: Tọa độ GPS
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_modules_user.UpdateLocationRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Cập nhật vị trí GPS
      tags:
      - Driver
  /earning/summary/daily:
    get:
      description: Tổng thu, tổng chi, lãi ròng trong một ngày
      parameters:
      - description: Ngày YYYY-MM-DD (mặc định hôm nay)
        in: query
        name: date
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_modules_earning.DailySummary'
      security:
      - BearerAuth: []
      summary: Tổng kết ngày
      tags:
      - Earning
  /earning/summary/monthly:
    get:
      description: Tổng thu, tổng chi, lãi ròng, trung bình lãi/ngày trong tháng
      parameters:
      - description: Tháng YYYY-MM (mặc định tháng này)
        in: query
        name: month
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_modules_earning.MonthlySummary'
      security:
      - BearerAuth: []
      summary: Tổng kết tháng
      tags:
      - Earning
  /earning/trips:
    get:
      description: Lấy danh sách cuốc xe, lọc theo ngày nếu cần
      parameters:
      - description: Lọc theo ngày YYYY-MM-DD
        in: query
        name: date
        type: string
      - description: Số kết quả (mặc định 50)
        in: query
        name: limit
        type: integer
      - description: Offset
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/internal_modules_earning.Trip'
            type: array
      security:
      - BearerAuth: []
      summary: Danh sách cuốc xe
      tags:
      - Earning
    post:
      consumes:
      - application/json
      description: Tài xế nhập cuốc xe mới với tổng thu, phí nền tảng, xăng, chi phí
        khác. Hệ thống tự tính lãi ròng.
      parameters:
      - description: Thông tin cuốc xe
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_modules_earning.AddTripRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/internal_modules_earning.Trip'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Ghi nhận cuốc xe
      tags:
      - Earning
  /emergency/contacts:
    get:
      description: Lấy danh sách anh em thân thiết
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/internal_modules_emergency.EmergencyContact'
            type: array
      security:
      - BearerAuth: []
      summary: Danh sách liên hệ khẩn cấp
      tags:
      - Emergency
    post:
      consumes:
      - application/json
      description: Thêm anh em thân thiết vào danh sách liên hệ khẩn cấp (tối đa 10)
      parameters:
      - description: Thông tin liên hệ
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_modules_emergency.AddContactRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/internal_modules_emergency.EmergencyContact'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Thêm liên hệ khẩn cấp
      tags:
      - Emergency
  /emergency/contacts/{contactId}:
    delete:
      description: Xóa anh em khỏi danh sách liên hệ khẩn cấp
      parameters:
      - description: User ID của liên hệ cần xóa
        in: path
        name: contactId
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Xóa liên hệ khẩn cấp
      tags:
      - Emergency
  /map/pois:
    post:
      consumes:
      - application/json
      description: Tài xế đóng góp một điểm POI (quán ăn, sửa xe, cà phê...) lên bản
        đồ sinh tồn
      parameters:
      - description: Thông tin POI
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_modules_survivalmap.CreatePOIRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/internal_modules_survivalmap.POI'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Tạo POI mới
      tags:
      - Map
  /map/pois/{id}:
    get:
      description: Lấy thông tin chi tiết một điểm POI theo ID
      parameters:
      - description: POI ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_modules_survivalmap.POI'
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Xem chi tiết POI
      tags:
      - Map
  /map/pois/{id}/upvote:
    post:
      description: Tài xế upvote một POI hữu ích
      parameters:
      - description: POI ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Upvote POI
      tags:
      - Map
  /map/pois/nearby:
    get:
      description: Truy vấn các điểm POI trong bán kính xung quanh vị trí tài xế (PostGIS)
      parameters:
      - description: Vĩ độ tài xế
        in: query
        name: lat
        required: true
        type: number
      - description: Kinh độ tài xế
        in: query
        name: lng
        required: true
        type: number
      - description: Bán kính km (mặc định 3)
        in: query
        name: radius_km
        type: number
      - description: 'Lọc loại: food, repair, cafe, wc, gas, rest, other'
        in: query
        name: category
        type: string
      - description: Số kết quả (mặc định 50)
        in: query
        name: limit
        type: integer
      - description: Offset phân trang
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/internal_modules_survivalmap.POIWithDistance'
            type: array
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Tìm POI xung quanh
      tags:
      - Map
  /mood/posts:
    get:
      description: Lấy danh sách bài viết xả mood, mới nhất trước
      parameters:
      - description: Số bài (mặc định 20)
        in: query
        name: limit
        type: integer
      - description: Offset phân trang
